<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | RSS Studio Automotivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 2rem;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
        }
        .login-form, .editor-section {
            display: none;
        }
        .login-form.active, .editor-section.active {
            display: block;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: white;
            font-family: inherit;
        }
        .faq-edit-item {
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
        }
        .btn-save {
            width: 100%;
            margin-top: 2rem;
        }
        #status-msg {
            margin-top: 10px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-container">
            <h1 class="title-secondary"><span class="highlight">Painel de Edição (Cloud)</span></h1>
            
            <!-- Login -->
            <div id="login-section" class="login-form active">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="username" placeholder="Admin">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="****">
                </div>
                <button onclick="login()" class="btn btn-primary">Entrar</button>
                <p id="login-error" style="color: #ff4444; margin-top: 10px; display: none;">Dados incorretos!</p>
            </div>

            <!-- Editor -->
            <div id="editor-section" class="editor-section">
                <h3>Editar Perguntas Frequentes (FAQ)</h3>
                <div id="faq-list">
                    <p>Carregando dados da nuvem...</p>
                </div>
                <button id="btn-save-action" onclick="saveChanges()" class="btn btn-primary btn-save">Publicar para Todos os Clientes</button>
                <div id="status-msg"></div>
                <button onclick="logout()" class="btn btn-glass" style="margin-top: 10px; width: 100%;">Sair</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ocllgxuizuwmqnzzcxwg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_S4WZO_OX4xJBYODyZrEhMg_KWmd9_me';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentContent = null;

        // Login Logic
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'caio' && pass === '1234') {
                document.getElementById('login-section').classList.remove('active');
                document.getElementById('editor-section').classList.add('active');
                loadEditor();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            location.reload();
        }

        // Editor Logic
        async function loadEditor() {
            const faqList = document.getElementById('faq-list');
            
            const { data, error } = await supabase
                .from('site_data')
                .select('content')
                .single();

            if (error) {
                faqList.innerHTML = '<p style="color:red">Erro ao carregar do Supabase. Verifique se a tabela foi criada.</p>';
                return;
            }

            currentContent = data.content;

            faqList.innerHTML = currentContent.faq.map((item, index) => `
                <div class="faq-edit-item">
                    <div class="form-group">
                        <label>Pergunta ${index + 1}</label>
                        <input type="text" value="${item.question}" id="q-${index}">
                    </div>
                    <div class="form-group">
                        <label>Resposta</label>
                        <textarea id="a-${index}" rows="3">${item.answer}</textarea>
                    </div>
                </div>
            `).join('');
        }

        async function saveChanges() {
            const btn = document.getElementById('btn-save-action');
            const status = document.getElementById('status-msg');
            
            btn.disabled = true;
            btn.innerText = 'Salvando na Nuvem...';
            status.innerText = '';

            const newFaq = currentContent.faq.map((item, index) => ({
                question: document.getElementById(`q-${index}`).value,
                answer: document.getElementById(`a-${index}`).value
            }));

            const updatedContent = { ...currentContent, faq: newFaq };

            const { error } = await supabase
                .from('site_data')
                .update({ content: updatedContent })
                .eq('id', 1); // Atualiza a linha 1

            if (error) {
                status.style.color = '#ff4444';
                status.innerText = 'Erro ao salvar: ' + error.message;
                btn.disabled = false;
                btn.innerText = 'Tentar Novamente';
            } else {
                status.style.color = '#00ff00';
                status.innerText = '✓ Publicado com sucesso! Todos os clientes verão a mudança.';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }
        }
    </script>
</body>
</html>
